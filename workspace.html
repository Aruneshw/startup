<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workspace | Team Zero Gravity</title>
    <meta name="description" content="Collaborative mind-map workspace for solving problems on Zero Gravity." />
    <link rel="stylesheet" href="./style.css" />
    <!-- CodeMirror 6 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@aspect-build/rules_js@0.0.0/codemirror.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="./supabase-config.js" defer></script>
    <script src="./auth.js" defer></script>
    <script src="./workspace.js" defer></script>
  </head>
  <body class="workspace-body">
    <!-- Minimal top bar -->
    <header class="ws-topbar">
      <div class="ws-topbar-left">
        <a href="./problem-hub.html" class="ws-back-btn" title="Back to Problem Hub">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="ws-project-name" id="ws-project-name">Loading workspace…</span>
      </div>
      <div class="ws-topbar-center">
        <div class="ws-collaborators" id="ws-collaborators"></div>
      </div>
      <div class="ws-topbar-right">
        <button class="ws-tool-btn" id="ws-add-node-btn" title="Add Node">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          <span>Add Node</span>
        </button>
        <button class="ws-tool-btn" id="ws-zoom-in" title="Zoom In">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35M8 11h6M11 8v6"/></svg>
        </button>
        <button class="ws-tool-btn" id="ws-zoom-out" title="Zoom Out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35M8 11h6"/></svg>
        </button>
        <span class="ws-save-status" id="ws-save-status">Saved ✓</span>
      </div>
    </header>

    <!-- Canvas area -->
    <div class="ws-canvas-container" id="ws-canvas-container">
      <svg class="ws-connections-svg" id="ws-connections"></svg>
      <div class="ws-nodes-layer" id="ws-nodes-layer">
        <!-- Central node + child nodes injected by workspace.js -->
      </div>
    </div>

    <!-- Add Node Modal -->
    <div class="zg-modal-overlay" id="ws-add-modal">
      <div class="zg-modal-content" style="max-width:420px;">
        <button class="zg-modal-close" id="ws-add-modal-close">&times;</button>
        <h2 class="section-heading" style="font-size:1.4rem;margin-bottom:1.25rem;">Add New Node</h2>
        <form id="ws-add-node-form" autocomplete="off">
          <div class="zg-form-group">
            <label for="ws-node-label">Node Title *</label>
            <input type="text" id="ws-node-label" required placeholder="e.g. main.py, architecture.pdf" />
          </div>
          <div class="zg-form-group">
            <label>Node Type</label>
            <div class="ws-type-grid" id="ws-type-grid">
              <button type="button" class="ws-type-btn is-active" data-type="code">
                <span>💻</span><span>Code</span>
              </button>
              <button type="button" class="ws-type-btn" data-type="text">
                <span>📝</span><span>Text</span>
              </button>
              <button type="button" class="ws-type-btn" data-type="image">
                <span>🖼️</span><span>Image</span>
              </button>
              <button type="button" class="ws-type-btn" data-type="pdf">
                <span>📄</span><span>PDF</span>
              </button>
              <button type="button" class="ws-type-btn" data-type="link">
                <span>🔗</span><span>Link</span>
              </button>
            </div>
          </div>
          <div class="zg-form-group" id="ws-lang-group">
            <label for="ws-node-lang">Language</label>
            <select id="ws-node-lang">
              <option value="javascript">JavaScript</option>
              <option value="python">Python</option>
              <option value="htmlmixed">HTML</option>
              <option value="css">CSS</option>
              <option value="sql">SQL</option>
              <option value="text/x-csrc">C / C++</option>
              <option value="text/x-java">Java</option>
            </select>
          </div>
          <button type="submit" class="button button-primary" style="width:100%;">Create Node</button>
        </form>
      </div>
    </div>

    <!-- Node Editor Side Panel -->
    <div class="ws-editor-panel" id="ws-editor-panel">
      <div class="ws-editor-header">
        <div>
          <span class="ws-editor-icon" id="ws-editor-icon">💻</span>
          <span class="ws-editor-title" id="ws-editor-title">File</span>
        </div>
        <div style="display:flex;gap:0.5rem;">
          <button class="ws-tool-btn ws-delete-btn" id="ws-delete-node-btn" title="Delete Node">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
          <button class="ws-tool-btn" id="ws-close-editor" title="Close">&times;</button>
        </div>
      </div>
      <div class="ws-editor-body" id="ws-editor-body">
        <!-- CodeMirror or preview inserted here -->
      </div>
    </div>
  </body>
</html>
